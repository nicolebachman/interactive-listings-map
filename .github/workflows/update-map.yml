name: Update Map Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: write

jobs:
  update-map:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download SharePoint workbook
        env:
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          SHAREPOINT_SITE_URL: https://binswanger365.sharepoint.com/sites/Public
          SHAREPOINT_FILE_PATH: /Shared Documents/Ackerman, Paige/Significant Listings Template.xlsx
        run: node download-sharepoint-file.js

      - name: Update locations.geojson
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: node parse-and-geocode.js

      - name: Commit and push updated GeoJSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- locations.geojson; then
            echo "No changes to locations.geojson"
            exit 0
          fi

          git add locations.geojson
          git commit -m "Update map data"
          git push
