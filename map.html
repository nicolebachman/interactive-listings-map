<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Listings Map</title>
  <link
    href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css"
    rel="stylesheet"
  >
  <style>
    :root {
      --ink: #1f2a33;
      --muted: #63717d;
      --accent: #d34b32;
      --accent-dark: #982f20;
      --page-gutter: 0px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background: transparent;
    }

    .page {
      width: 100%;
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .card {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      border: 0;
      border-radius: 0;
      overflow: hidden;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      min-height: 100%;
      height: 100vh;
      height: 100dvh;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 20px 12px;
      background: #ffffff;
    }

    .eyebrow {
      margin: 0;
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink);
      font-family: Arial, sans-serif;
      flex: 0 0 auto;
    }

    #map {
      display: block;
      width: 100%;
      min-height: 0;
      height: 100%;
      border-radius: 0;
    }

    .map-shell {
      position: relative;
      min-height: 0;
      height: 100%;
    }

    #map .mapboxgl-canvas-container,
    #map .mapboxgl-canvas {
      height: 100%;
    }

    #map canvas {
      cursor: grab;
    }

    #map.pin-hover canvas {
      cursor: pointer;
    }

    #map canvas:active {
      cursor: grabbing;
    }

    .mapboxgl-popup {
      max-width: min(320px, calc(100vw - 32px));
    }

    .mapboxgl-popup-content {
      padding: 13px 40px 13px 14px;
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(31, 42, 51, 0.16);
      max-height: min(300px, calc(100vh - 180px));
      overflow: auto;
    }

    .mapboxgl-popup-close-button {
      top: 6px;
      right: 6px;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      font-size: 18px;
      line-height: 1;
    }

    .popup h3 {
      margin: 0 0 6px;
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.25;
      letter-spacing: 0.01em;
      max-width: 26ch;
    }

    .popup-broker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 12px;
      font-size: 0.92rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--ink);
    }

    .popup-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-left: 2px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
    }

    .broker-value {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .broker-dot {
      width: 0.8rem;
      height: 0.8rem;
      border-radius: 50%;
      flex: 0 0 auto;
      border: 2px solid rgba(255, 248, 242, 0.95);
      box-shadow: 0 0 0 1px rgba(31, 42, 51, 0.14);
    }

    .popup dl {
      margin: 0;
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 6px 10px;
      font-size: 0.8rem;
      line-height: 1.32;
    }

    .popup dt {
      font-weight: 700;
      color: var(--muted);
    }

    .popup dd {
      margin: 0;
      color: var(--muted);
    }

    .error {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 2;
      max-width: 32rem;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(152, 47, 32, 0.18);
      background: rgba(211, 75, 50, 0.08);
      color: var(--accent-dark);
      font-family: Arial, sans-serif;
      font-size: 0.92rem;
      line-height: 1.45;
      display: none;
    }

    .filter-bar {
      position: relative;
      width: min(820px, 100%);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: nowrap;
      gap: 18px;
      margin-left: auto;
      padding: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    .filter-bar label,
    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: Arial, sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .filter-group {
      min-width: 0;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: flex-start;
      flex: 0 0 auto;
    }

    .filter-title {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .filter-range {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      padding: 0 2px;
    }

    .filter-row .filter-title {
      min-width: 0;
    }

    .filter-row > .filter-title {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: Arial, sans-serif;
    }

    .filter-values {
      display: flex;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--ink);
    }

    .range-pair {
      position: relative;
      height: 20px;
      width: 110px;
      flex: 0 0 110px;
    }

    .range-fill {
      position: absolute;
      top: 8px;
      height: 4px;
      border-radius: 999px;
      background: rgba(95, 127, 148, 0.38);
      pointer-events: none;
    }

    .filter-bar select,
    .filter-bar input {
      width: auto;
      min-width: 0;
      padding: 5px 7px;
      border: 1px solid rgba(31, 42, 51, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      font-family: Arial, sans-serif;
      font-size: 0.8rem;
      line-height: 1.2;
    }

    .filter-bar input {
      width: 88px;
    }

    .range-pair input[type="range"] {
      position: absolute;
      left: 0;
      top: 2px;
      width: 100%;
      height: 16px;
      margin: 0;
      padding: 0;
      border: 0;
      background: none;
      appearance: none;
      pointer-events: none;
    }

    .range-pair input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 999px;
      background: rgba(31, 42, 51, 0.14);
    }

    .range-pair input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 12px;
      height: 12px;
      margin-top: -4px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      background: #5f7f94;
      box-shadow: 0 1px 3px rgba(31, 42, 51, 0.22);
      pointer-events: auto;
      cursor: pointer;
    }

    .range-pair input[type="range"]::-moz-range-track {
      height: 4px;
      border-radius: 999px;
      background: rgba(31, 42, 51, 0.14);
    }

    .range-pair input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      background: #5f7f94;
      box-shadow: 0 1px 3px rgba(31, 42, 51, 0.22);
      pointer-events: auto;
      cursor: pointer;
    }

    .filter-bar button {
      padding: 5px 7px;
      border: 0;
      border-radius: 8px;
      background: rgba(31, 42, 51, 0.08);
      color: var(--ink);
      font-family: Arial, sans-serif;
      font-size: 0.8rem;
      line-height: 1.2;
      cursor: pointer;
    }

    .filter-bar button:hover {
      background: rgba(31, 42, 51, 0.14);
    }

    .legend-panel {
      position: absolute;
      right: 14px;
      bottom: 28px;
      z-index: 2;
      width: min(270px, calc(100% - 290px));
      padding: 10px 12px 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 24px rgba(31, 42, 51, 0.14);
      backdrop-filter: blur(8px);
      font-family: Arial, sans-serif;
    }

    .legend-toggle {
      width: 24px;
      height: 24px;
      border: 0;
      border-radius: 999px;
      background: rgba(31, 42, 51, 0.08);
      color: var(--ink);
      font-family: Arial, sans-serif;
      font-size: 0.95rem;
      line-height: 1;
      cursor: pointer;
      padding: 0 0 2px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .legend-toggle:hover {
      background: rgba(31, 42, 51, 0.14);
    }

    .legend-panel.is-collapsed {
      padding: 6px 10px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-width: 110px;
    }

    .legend-panel.is-collapsed .legend-content {
      display: none;
    }

    .legend-panel.is-collapsed .legend-subtitle {
      display: none;
    }

    .legend-panel.is-collapsed .legend-toggle {
      flex: 0 0 auto;
      transform: translate(-0.5px, 0.5px);
    }

    .legend-toggle-label {
      display: none;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--ink);
      line-height: 1;
    }

    .legend-panel.is-collapsed .legend-toggle-label {
      display: inline;
      transform: translate(3px, 3px);
    }

    .legend-panel.is-collapsed .legend-toggle {
      transform: translate(3px, 3px);
    }

    .legend-items {
      display: grid;
      gap: 6px;
    }

    .legend-section + .legend-section {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(31, 42, 51, 0.08);
    }

    .legend-subtitle {
      margin: 0 0 8px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .legend-section-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 0 0 8px;
    }

    .legend-section-heading .legend-subtitle {
      margin: 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--ink);
    }

    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
      border: 1px solid rgba(255, 248, 242, 0.95);
      box-shadow: 0 0 0 1px rgba(31, 42, 51, 0.14);
    }

    @media (max-width: 900px) {
      .page {
        width: 100%;
        margin: 0 auto;
        min-height: 100vh;
        min-height: 100dvh;
      }

      .card {
        min-height: 100vh;
        min-height: 100dvh;
        height: 100vh;
        height: 100dvh;
      }

      .page-header {
        flex-direction: column;
        align-items: stretch;
        padding: 12px 16px 10px;
      }

      #map {
        height: 100%;
        min-height: 320px;
      }

      .filter-bar {
        width: 100%;
        gap: 18px;
        justify-content: flex-end;
        flex-wrap: nowrap;
      }

      .filter-bar label,
      .filter-group {
        flex: none;
      }

      .filter-row {
        justify-content: flex-start;
        flex-wrap: nowrap;
      }

      .filter-range {
        min-width: 0;
      }

      .filter-bar input,
      .filter-bar select,
      .filter-bar button {
        width: 100%;
      }

      .legend-panel {
        right: 10px;
        left: auto;
        width: min(170px, calc(100% - 250px));
        bottom: 24px;
        border-radius: 12px;
      }
    }
  </style>
</head>
  <body>
  <div class="page">
    <div class="card">
      <header class="page-header">
        <p class="eyebrow">Global Listings</p>
        <form id="filterBar" class="filter-bar" aria-label="Listing filters">
          <div class="filter-row">
            <span class="filter-title">Type</span>
            <label>
              <select id="filterType">
                <option value="">All</option>
                <option value="sale">Sale</option>
                <option value="lease">Lease</option>
              </select>
            </label>
          </div>
          <div class="filter-row">
            <div class="filter-group filter-range">
              <span class="filter-title">SF</span>
              <div class="filter-values">
                <span id="filterSfMinValue">0</span>
              </div>
              <div class="range-pair">
                <div id="filterSfFill" class="range-fill"></div>
                <input id="filterSfMin" type="range" min="0" max="100" step="1000" value="0">
                <input id="filterSfMax" type="range" min="0" max="100" step="1000" value="100">
              </div>
              <div class="filter-values">
                <span id="filterSfMaxValue">0</span>
              </div>
            </div>
          </div>
          <div class="filter-row">
            <div class="filter-group filter-range">
              <span class="filter-title">Price</span>
              <div class="filter-values">
                <span id="filterPriceMinValue">$0</span>
              </div>
              <div class="range-pair">
                <div id="filterPriceFill" class="range-fill"></div>
                <input id="filterPriceMin" type="range" min="0" max="100" step="100000" value="0">
                <input id="filterPriceMax" type="range" min="0" max="100" step="100000" value="100">
              </div>
              <div class="filter-values">
                <span id="filterPriceMaxValue">$0</span>
              </div>
            </div>
          </div>
          <div class="filter-row">
            <button id="clearFilters" type="button">Clear</button>
          </div>
        </form>
      </header>
      <div id="error" class="error"></div>
      <div class="map-shell">
        <div id="map" aria-label="Map of property listings"></div>
        <aside class="legend-panel" aria-label="Listing legend">
          <div class="legend-section-heading">
            <h3 class="legend-subtitle">Square Footage</h3>
            <span class="legend-toggle-label">Legend</span>
            <button
              id="legendToggle"
              class="legend-toggle"
              type="button"
              aria-expanded="true"
              aria-label="Minimize legend"
            >-</button>
          </div>
          <div class="legend-content">
            <section class="legend-section" aria-label="Square footage ranges">
              <div id="legendSfItems" class="legend-items"></div>
            </section>
            <section class="legend-section" aria-label="Acreage ranges">
              <h3 class="legend-subtitle">Land Acreage</h3>
              <div id="legendAcreageItems" class="legend-items"></div>
            </section>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
  <script>
    mapboxgl.accessToken = "pk.eyJ1Ijoibmljb2xlYmFjaG1hbiIsImEiOiJjbXE5eHl1MGYwMGM2MnJwbm13YjJveGRuIn0.E1WbrTh7gLcMrzhnWdSI5A";

    const map = new mapboxgl.Map({
      container: "map",
      style: "mapbox://styles/mapbox/streets-v12",
      center: [-15, 20],
      zoom: 1.35,
      projection: "mercator",
      pitch: 0,
      bearing: 0,
      maxPitch: 0,
      dragRotate: false,
      pitchWithRotate: false,
      touchPitch: false
    });

    const navigationControl = new mapboxgl.NavigationControl();
    map.addControl(navigationControl, "top-right");

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function hashBrokerName(value) {
      let hash = 0;
      const text = String(value || "Unknown Broker");

      for (let index = 0; index < text.length; index += 1) {
        hash = ((hash << 5) - hash + text.charCodeAt(index)) >>> 0;
      }

      return hash;
    }

    function brokerColor(value) {
      const goldenAngle = 137.508;
      const hue = Math.round((hashBrokerName(value) * goldenAngle) % 360);
      return `hsl(${hue}, 65%, 50%)`;
    }

    const squareFootagePalette = ["#1f6d8c", "#3d8ea1", "#70b4be", "#a7d4d9"];
    const acreagePalette = ["#3d6b2f", "#5d9145", "#83b468", "#b3d39b"];

    function hueDistance(a, b) {
      const diff = Math.abs(a - b) % 360;
      return Math.min(diff, 360 - diff);
    }

    function buildBrokerColorMap(features) {
      const brokerNames = Array.from(
        new Set(
          features
            .map((feature) => feature.properties?.broker_name || feature.properties?.Owner || "")
            .filter(Boolean)
        )
      ).sort((a, b) => a.localeCompare(b));

      const lightnessSteps = [50, 42, 58, 34, 66];
      const assigned = [];
      const colorMap = new Map();

      for (const brokerName of brokerNames) {
        const baseHue = Math.round((hashBrokerName(brokerName) * 137.508) % 360);
        let chosenLightness = lightnessSteps[0];

        for (const candidateLightness of lightnessSteps) {
          const conflicts = assigned.some((existing) => {
            const tooCloseInHue = hueDistance(baseHue, existing.hue) < 18;
            const tooCloseInLightness = Math.abs(candidateLightness - existing.lightness) < 10;
            return tooCloseInHue && tooCloseInLightness;
          });

          if (!conflicts) {
            chosenLightness = candidateLightness;
            break;
          }
        }

        assigned.push({
          brokerName,
          hue: baseHue,
          lightness: chosenLightness
        });

        colorMap.set(brokerName, `hsl(${baseHue}, 65%, ${chosenLightness}%)`);
      }

      return colorMap;
    }

    function getSquareFootageRangeSpecs(minValue, maxValue) {
      const safeMin = Number.isFinite(minValue) ? minValue : 0;
      const safeMax = Number.isFinite(maxValue) ? maxValue : safeMin;
      const span = Math.max(safeMax - safeMin, 1);
      const step = span / 4;

      return squareFootagePalette.map((color, index) => {
        const min = index === 0 ? safeMin : safeMin + (step * index);
        const max = index === 3 ? safeMax : safeMin + (step * (index + 1));
        return {
          color,
          min,
          max,
          label: `${formatCompactNumber(min)} - ${formatCompactNumber(max)}`
        };
      });
    }

    function getSquareFootageColor(value, rangeSpecs) {
      const numericValue = Number(value);
      if (!Number.isFinite(numericValue) || !Array.isArray(rangeSpecs) || rangeSpecs.length === 0) {
        return squareFootagePalette[1];
      }

      for (let index = 0; index < rangeSpecs.length; index += 1) {
        const spec = rangeSpecs[index];
        const isLast = index === rangeSpecs.length - 1;
        if (numericValue >= spec.min && (isLast ? numericValue <= spec.max : numericValue < spec.max)) {
          return spec.color;
        }
      }

      return rangeSpecs[rangeSpecs.length - 1].color;
    }

    function getAcreageRangeSpecs(minValue, maxValue) {
      const safeMin = Number.isFinite(minValue) ? minValue : 0;
      const safeMax = Number.isFinite(maxValue) ? maxValue : safeMin;
      const span = Math.max(safeMax - safeMin, 1);
      const step = span / 4;

      return acreagePalette.map((color, index) => {
        const min = index === 0 ? safeMin : safeMin + (step * index);
        const max = index === 3 ? safeMax : safeMin + (step * (index + 1));
        return {
          color,
          min,
          max,
          label: `${Number(min).toFixed(min < 10 ? 1 : 0)} - ${Number(max).toFixed(max < 10 ? 1 : 0)}`
        };
      });
    }

    function getAcreageColor(value, rangeSpecs) {
      const numericValue = Number(value);
      if (!Number.isFinite(numericValue) || !Array.isArray(rangeSpecs) || rangeSpecs.length === 0) {
        return acreagePalette[1];
      }

      for (let index = 0; index < rangeSpecs.length; index += 1) {
        const spec = rangeSpecs[index];
        const isLast = index === rangeSpecs.length - 1;
        if (numericValue >= spec.min && (isLast ? numericValue <= spec.max : numericValue < spec.max)) {
          return spec.color;
        }
      }

      return rangeSpecs[rangeSpecs.length - 1].color;
    }

    function renderLegendItems(elementId, rangeSpecs) {
      const legendItems = document.getElementById(elementId);
      legendItems.innerHTML = rangeSpecs.map((spec) => `
        <div class="legend-item">
          <span class="legend-swatch" style="background:${escapeHtml(spec.color)}"></span>
          <span>${escapeHtml(spec.label)}</span>
        </div>
      `).join("");
    }

    function bindLegendToggle() {
      const legendPanel = document.querySelector(".legend-panel");
      const legendToggle = document.getElementById("legendToggle");
      if (!legendPanel || !legendToggle) {
        return;
      }

      legendToggle.addEventListener("click", () => {
        const isCollapsed = legendPanel.classList.toggle("is-collapsed");
        legendToggle.textContent = isCollapsed ? "+" : "-";
        legendToggle.setAttribute("aria-expanded", String(!isCollapsed));
        legendToggle.setAttribute(
          "aria-label",
          isCollapsed ? "Expand legend" : "Minimize legend"
        );
      });
    }

    function pickFirstNonEmpty(properties, keys) {
      for (const key of keys) {
        const value = properties?.[key];
        if (value === 0 || value === "0") {
          return value;
        }

        if (value !== undefined && value !== null && String(value).trim() !== "") {
          return value;
        }
      }

      return "";
    }

    function formatCurrency(value) {
      const text = String(value ?? "").trim();
      if (!text) {
        return "";
      }

      const digitsOnly = text.replace(/,/g, "");
      if (!/^\d+(\.\d+)?$/.test(digitsOnly)) {
        return text;
      }

      const amount = Number(digitsOnly);
      if (!Number.isFinite(amount)) {
        return text;
      }

      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0
      }).format(amount);
    }

    function compactDealName(value) {
      const text = String(value ?? "").trim();
      if (!text) {
        return "";
      }

      const parts = text.split(/\s+-\s+/).map((part) => part.trim()).filter(Boolean);
      if (parts.length >= 3) {
        return parts[parts.length - 1];
      }

      return text;
    }

    function popupMarkup(properties) {
      const brokerName = pickFirstNonEmpty(properties, ["broker_name", "Owner"]) || "Unknown Broker";
      const markerColor = properties.marker_color || brokerColor(brokerName);
      const address = pickFirstNonEmpty(properties, [
        "address",
        "street_address",
        "Deal: Deal Name"
      ]) || "Listing Details";
      const recordType = pickFirstNonEmpty(properties, ["record_type", "Deal: Record Type"]);
      const askingPrice = formatCurrency(
        pickFirstNonEmpty(properties, ["asking_price", "Asking Price"])
      );
      const leaseRate = pickFirstNonEmpty(properties, ["lease_rate", "Lease Rate"]);
      const landlordCompany = pickFirstNonEmpty(properties, [
        "landlord_company",
        "Landlord Company/Seller Company"
      ]);
      const squareFootage = pickFirstNonEmpty(properties, ["square_footage", "Square Footage"]);
      const leaseSquareFootage = pickFirstNonEmpty(properties, [
        "lease_square_footage",
        "Lease Square Footage"
      ]);
      const effectiveDate = pickFirstNonEmpty(properties, [
        "listing_effective_date",
        "Listing Effective Date"
      ]);
      const expirationDate = pickFirstNonEmpty(properties, [
        "listing_expiration_date",
        "Listing Expiration Date"
      ]);
      const isLease = String(recordType).trim().toLowerCase() === "lease";
      const fields = [
        ["Broker", brokerName],
        ["Record Type", recordType],
        ["Asking Price", askingPrice],
        ["Landlord/Seller", landlordCompany],
        ["Effective Date", effectiveDate],
        ["Expiration Date", expirationDate]
      ];

      if (isLease) {
        fields.splice(3, 0, ["Lease Rate", leaseRate]);
        fields.splice(6, 0, ["Lease Sq Ft", leaseSquareFootage]);
      }

      return `
        <div class="popup">
          <h3>${escapeHtml(address)}</h3>
          <div class="popup-broker">
            <span class="broker-dot" style="background:${escapeHtml(markerColor)}" aria-hidden="true"></span>
            <span class="popup-meta">${escapeHtml(squareFootage || "N/A")} SF</span>
          </div>
          <dl>
            ${fields.map(([label, value, isHtml]) => `
              <dt>${escapeHtml(label)}</dt>
              <dd>${isHtml ? value : escapeHtml(value || "N/A")}</dd>
            `).join("")}
          </dl>
        </div>
      `;
    }

    function showError(message) {
      const errorEl = document.getElementById("error");
      errorEl.textContent = message;
      errorEl.style.display = "block";
    }

    function parseNumericValue(value) {
      const digitsOnly = String(value ?? "").replace(/[^0-9.]/g, "");
      if (!digitsOnly) {
        return null;
      }

      const number = Number(digitsOnly);
      return Number.isFinite(number) ? number : null;
    }

    function formatCompactNumber(value, prefix = "") {
      const number = Number(value);
      if (!Number.isFinite(number)) {
        return `${prefix}0`;
      }

      if (Math.abs(number) >= 1000000) {
        return `${prefix}${(number / 1000000).toFixed(number % 1000000 === 0 ? 0 : 1)}M`;
      }

      if (Math.abs(number) >= 1000) {
        return `${prefix}${(number / 1000).toFixed(number % 1000 === 0 ? 0 : 1)}k`;
      }

      return `${prefix}${Math.round(number)}`;
    }

    function unifyWaterColor() {
      const waterColor = "#9fc7d8";
      const styleLayers = map.getStyle()?.layers || [];

      for (const layer of styleLayers) {
        if (!/\bwater\b/i.test(layer.id)) {
          continue;
        }

        if (layer.type === "fill") {
          map.setPaintProperty(layer.id, "fill-color", waterColor);
        }

        if (layer.type === "line") {
          map.setPaintProperty(layer.id, "line-color", waterColor);
        }
      }
    }

    function deepenWaterLabelColor() {
      const labelColor = "#3f6f8e";
      const styleLayers = map.getStyle()?.layers || [];

      for (const layer of styleLayers) {
        if (layer.type !== "symbol") {
          continue;
        }

        if (!/\bwater\b/i.test(layer.id) && !/\bmarine\b/i.test(layer.id)) {
          continue;
        }

        if (layer.paint?.["text-color"] !== undefined) {
          map.setPaintProperty(layer.id, "text-color", labelColor);
        }
      }
    }

    let allPointFeatures = [];
    let popup = null;
    let filterBounds = null;
    let squareFootageRangeSpecs = [];
    let acreageRangeSpecs = [];

    function fitToFeatures(features) {
      if (!Array.isArray(features) || features.length === 0) {
        return;
      }

      const bounds = new mapboxgl.LngLatBounds();
      features.forEach((feature) => {
        bounds.extend(feature.geometry.coordinates);
      });

      if (!bounds.isEmpty()) {
        map.fitBounds(bounds, {
          padding: { top: 60, right: 60, bottom: 60, left: 60 },
          maxZoom: 12,
          duration: 0
        });
      }
    }

    function applyFilters() {
      const source = map.getSource("listings");
      if (!source) {
        return;
      }

      const typeValue = String(document.getElementById("filterType").value || "").trim().toLowerCase();
      const minSf = parseNumericValue(document.getElementById("filterSfMin").value);
      const maxSf = parseNumericValue(document.getElementById("filterSfMax").value);
      const minPrice = parseNumericValue(document.getElementById("filterPriceMin").value);
      const maxPrice = parseNumericValue(document.getElementById("filterPriceMax").value);

      const filteredFeatures = allPointFeatures.filter((feature) => {
        const properties = feature.properties || {};
        const recordType = String(
          pickFirstNonEmpty(properties, ["record_type", "Deal: Record Type"])
        ).trim().toLowerCase();
        const squareFootage = parseNumericValue(
          pickFirstNonEmpty(properties, ["square_footage", "Square Footage"])
        );
        const askingPrice = parseNumericValue(
          pickFirstNonEmpty(properties, ["asking_price", "Asking Price"])
        );

        if (typeValue && recordType !== typeValue) {
          return false;
        }

        if (minSf !== null && (squareFootage === null || squareFootage < minSf)) {
          return false;
        }

        if (maxSf !== null && (squareFootage === null || squareFootage > maxSf)) {
          return false;
        }

        if (minPrice !== null && (askingPrice === null || askingPrice < minPrice)) {
          return false;
        }

        if (maxPrice !== null && (askingPrice === null || askingPrice > maxPrice)) {
          return false;
        }

        return true;
      });

      if (popup) {
        popup.remove();
        popup = null;
      }

      source.setData({
        type: "FeatureCollection",
        features: filteredFeatures
      });
    }

    function syncRangePair(kind) {
      const minInput = document.getElementById(`filter${kind}Min`);
      const maxInput = document.getElementById(`filter${kind}Max`);
      const fill = document.getElementById(`filter${kind}Fill`);
      const minValue = Math.min(Number(minInput.value), Number(maxInput.value));
      const maxValue = Math.max(Number(minInput.value), Number(maxInput.value));
      const minBound = Number(minInput.min);
      const maxBound = Number(minInput.max);

      minInput.value = String(minValue);
      maxInput.value = String(maxValue);

      const minLabel = document.getElementById(`filter${kind}MinValue`);
      const maxLabel = document.getElementById(`filter${kind}MaxValue`);
      const prefix = kind === "Price" ? "$" : "";

      minLabel.textContent = formatCompactNumber(minValue, prefix);
      maxLabel.textContent = formatCompactNumber(maxValue, prefix);

      if (fill && Number.isFinite(minBound) && Number.isFinite(maxBound) && maxBound > minBound) {
        const startPercent = ((minValue - minBound) / (maxBound - minBound)) * 100;
        const endPercent = ((maxValue - minBound) / (maxBound - minBound)) * 100;
        fill.style.left = `${startPercent}%`;
        fill.style.width = `${Math.max(endPercent - startPercent, 0)}%`;
      }
    }

    function initializeRangeFilters(features) {
      const sfValues = features
        .map((feature) => parseNumericValue(
          pickFirstNonEmpty(feature.properties, ["square_footage", "Square Footage"])
        ))
        .filter((value) => value !== null);
      const priceValues = features
        .map((feature) => parseNumericValue(
          pickFirstNonEmpty(feature.properties, ["asking_price", "Asking Price"])
        ))
        .filter((value) => value !== null);

      const sfMin = sfValues.length ? Math.min(...sfValues) : 0;
      const sfMax = sfValues.length ? Math.max(...sfValues) : 1000000;
      const priceMin = priceValues.length ? Math.min(...priceValues) : 0;
      const priceMax = priceValues.length ? Math.max(...priceValues) : 10000000;

      filterBounds = { sfMin, sfMax, priceMin, priceMax };

      const sfMinInput = document.getElementById("filterSfMin");
      const sfMaxInput = document.getElementById("filterSfMax");
      sfMinInput.min = String(sfMin);
      sfMinInput.max = String(sfMax);
      sfMinInput.step = "1000";
      sfMinInput.value = String(sfMin);
      sfMaxInput.min = String(sfMin);
      sfMaxInput.max = String(sfMax);
      sfMaxInput.step = "1000";
      sfMaxInput.value = String(sfMax);

      const priceMinInput = document.getElementById("filterPriceMin");
      const priceMaxInput = document.getElementById("filterPriceMax");
      const priceStep = priceMax >= 1000000 ? 100000 : 10000;
      priceMinInput.min = String(priceMin);
      priceMinInput.max = String(priceMax);
      priceMinInput.step = String(priceStep);
      priceMinInput.value = String(priceMin);
      priceMaxInput.min = String(priceMin);
      priceMaxInput.max = String(priceMax);
      priceMaxInput.step = String(priceStep);
      priceMaxInput.value = String(priceMax);

      syncRangePair("Sf");
      syncRangePair("Price");
    }

    function bindFilters() {
      document.getElementById("filterType").addEventListener("change", applyFilters);
      document.getElementById("filterSfMin").addEventListener("input", () => {
        syncRangePair("Sf");
        applyFilters();
      });
      document.getElementById("filterSfMax").addEventListener("input", () => {
        syncRangePair("Sf");
        applyFilters();
      });
      document.getElementById("filterPriceMin").addEventListener("input", () => {
        syncRangePair("Price");
        applyFilters();
      });
      document.getElementById("filterPriceMax").addEventListener("input", () => {
        syncRangePair("Price");
        applyFilters();
      });
      document.getElementById("clearFilters").addEventListener("click", () => {
        document.getElementById("filterType").value = "";
        if (filterBounds) {
          document.getElementById("filterSfMin").value = String(filterBounds.sfMin);
          document.getElementById("filterSfMax").value = String(filterBounds.sfMax);
          document.getElementById("filterPriceMin").value = String(filterBounds.priceMin);
          document.getElementById("filterPriceMax").value = String(filterBounds.priceMax);
          syncRangePair("Sf");
          syncRangePair("Price");
        }
        applyFilters();
      });
    }

    async function loadListings() {
      try {
        unifyWaterColor();
        deepenWaterLabelColor();
        bindLegendToggle();

        const response = await fetch("./locations.geojson");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const geojson = await response.json();
        if (!Array.isArray(geojson.features)) {
          throw new Error("Invalid GeoJSON structure.");
        }

        const pointFeatures = geojson.features.filter(
          (feature) => feature.geometry?.type === "Point"
        );

        const sfValues = pointFeatures
          .map((feature) => parseNumericValue(
            pickFirstNonEmpty(feature.properties, ["square_footage", "Square Footage"])
          ))
          .filter((value) => value !== null);
        const acreageValues = pointFeatures
          .map((feature) => parseNumericValue(
            pickFirstNonEmpty(feature.properties, ["acreage", "Acreage"])
          ))
          .filter((value) => value !== null);
        const sfMin = sfValues.length ? Math.min(...sfValues) : 0;
        const sfMax = sfValues.length ? Math.max(...sfValues) : 1;
        squareFootageRangeSpecs = getSquareFootageRangeSpecs(sfMin, sfMax);
        const acreageMin = acreageValues.length ? Math.min(...acreageValues) : 0;
        const acreageMax = acreageValues.length ? Math.max(...acreageValues) : 1;
        acreageRangeSpecs = getAcreageRangeSpecs(acreageMin, acreageMax);
        renderLegendItems("legendSfItems", squareFootageRangeSpecs);
        renderLegendItems("legendAcreageItems", acreageRangeSpecs);

        pointFeatures.forEach((feature) => {
          const squareFootage = parseNumericValue(
            pickFirstNonEmpty(feature.properties, ["square_footage", "Square Footage"])
          );

          feature.properties = {
            ...feature.properties,
            marker_color: getSquareFootageColor(squareFootage, squareFootageRangeSpecs)
          };
        });
        allPointFeatures = pointFeatures;
        initializeRangeFilters(pointFeatures);

        map.addSource("listings", {
          type: "geojson",
          data: {
            ...geojson,
            features: pointFeatures
          }
        });

        map.addLayer({
          id: "listing-pin-shadow",
          type: "circle",
          source: "listings",
          paint: {
            "circle-radius": 10,
            "circle-color": "rgba(31, 42, 51, 0.08)",
            "circle-blur": 0.55,
            "circle-translate": [0, 4]
          }
        });

        map.addLayer({
          id: "listing-pin",
          type: "circle",
          source: "listings",
          paint: {
            "circle-radius": 7,
            "circle-color": ["coalesce", ["get", "marker_color"], "#d34b32"],
            "circle-stroke-width": 0.5,
            "circle-stroke-color": "#fff8f2"
          }
        });

        function getSafePadding() {
          const isMobile = window.innerWidth <= 900;
          const horizontal = isMobile ? 14 : 24;
          const top = isMobile ? 6 : 24;
          const bottom = isMobile ? 8 : 28;
          return { top, right: horizontal, bottom, left: horizontal };
        }

        function keepPopupInView() {
          if (!popup) {
            return;
          }

          const popupEl = popup.getElement();
          if (!popupEl) {
            return;
          }

          const mapRect = map.getContainer().getBoundingClientRect();
          const popupRect = popupEl.getBoundingClientRect();
          const padding = getSafePadding();

          let dx = 0;
          let dy = 0;

          if (popupRect.left < mapRect.left + padding.left) {
            dx = mapRect.left + padding.left - popupRect.left;
          } else if (popupRect.right > mapRect.right - padding.right) {
            dx = mapRect.right - padding.right - popupRect.right;
          }

          if (popupRect.top < mapRect.top + padding.top) {
            dy = mapRect.top + padding.top - popupRect.top;
          } else if (popupRect.bottom > mapRect.bottom - padding.bottom) {
            dy = mapRect.bottom - padding.bottom - popupRect.bottom;
          }

          if (dx !== 0 || dy !== 0) {
            map.panBy([-dx, -dy], {
              duration: 450,
              essential: true
            });
          }

          return { dx, dy, popupRect, mapRect, padding };
        }

        function createPopupForPoint(point) {
          const isMobile = window.innerWidth <= 900;
          const mapHeight = map.getContainer().clientHeight;
          const anchor = isMobile
            ? (point.y < mapHeight * 0.42 ? "top" : "bottom")
            : undefined;
          const offset = isMobile ? 10 : 18;

          if (popup) {
            popup.remove();
          }

          const popupOptions = {
            closeButton: true,
            closeOnClick: false,
            offset,
            maxWidth: "min(320px, calc(100vw - 32px))"
          };

          if (anchor) {
            popupOptions.anchor = anchor;
          }

          popup = new mapboxgl.Popup(popupOptions);

          return popup;
        }

        function maybeFlipPopupAnchor(result, feature, point) {
          if (!popup || !result) {
            return;
          }

          const isMobile = window.innerWidth <= 900;
          if (!isMobile) {
            return;
          }

          const overTop = result.popupRect.top < result.mapRect.top + result.padding.top;
          const overBottom = result.popupRect.bottom > result.mapRect.bottom - result.padding.bottom;

          if (!overTop && !overBottom) {
            return;
          }

          const nextAnchor = popup.options.anchor === "top" ? "bottom" : "top";

          const nextPopup = new mapboxgl.Popup({
            anchor: nextAnchor,
            closeButton: true,
            closeOnClick: false,
            offset: 10,
            maxWidth: "min(320px, calc(100vw - 32px))"
          });

          popup.remove();
          popup = nextPopup
            .setLngLat(feature.geometry.coordinates)
            .setHTML(popupMarkup(feature.properties || {}))
            .addTo(map);

          window.requestAnimationFrame(() => {
            keepPopupInView();
          });
        }

        map.on("click", "listing-pin", (event) => {
          const feature = event.features?.[0];
          if (!feature) {
            return;
          }

          createPopupForPoint(event.point)
            .setLngLat(feature.geometry.coordinates)
            .setHTML(popupMarkup(feature.properties || {}))
            .addTo(map);

          window.requestAnimationFrame(() => {
            const result = keepPopupInView();
            maybeFlipPopupAnchor(result, feature, event.point);
          });
        });

        map.on("click", (event) => {
          const clickedPins = map.queryRenderedFeatures(event.point, {
            layers: ["listing-pin"]
          });

          if (clickedPins.length === 0 && popup) {
            popup.remove();
            popup = null;
          }
        });

        map.on("mouseenter", "listing-pin", () => {
          map.getContainer().classList.add("pin-hover");
        });

        map.on("mouseleave", "listing-pin", () => {
          map.getContainer().classList.remove("pin-hover");
        });

        bindFilters();
        fitToFeatures(pointFeatures);
      } catch (error) {
        console.error("Failed to load listings:", error);
        showError(
          "Could not load locations.geojson. If you opened this file directly in the browser, serve the folder locally with a simple web server first."
        );
      }
    }

    map.on("load", loadListings);
  </script>
</body>
</html>
